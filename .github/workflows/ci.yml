name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Lint & syntax check ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyflakes

      - name: Check syntax (pyflakes)
        run: pyflakes api/ main.py


  # ── Integration test ─────────────────────────────────────────
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       cms_db
          POSTGRES_USER:     cms_user
          POSTGRES_PASSWORD: cms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cms_user -d cms_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DB_HOST:          localhost
      DB_PORT:          5432
      DB_NAME:          cms_db
      DB_USER:          cms_user
      DB_PASSWORD:      cms_password
      JWT_SECRET:       ci-test-secret
      JWT_ALGORITHM:    HS256
      JWT_EXPIRE_HOURS: 24
      REDIS_HOST:       localhost
      REDIS_PORT:       6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt httpx pytest

      - name: Apply schema
        run: psql postgresql://cms_user:cms_password@localhost:5432/cms_db -f sql/create.sql

      - name: Apply views
        run: psql postgresql://cms_user:cms_password@localhost:5432/cms_db -f sql/views.sql

      - name: Run tests
        run: pytest tests/ -v


  # ── Deploy (only on push to main after tests pass) ───────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
